name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify publish target is configured
        shell: bash
        env:
          FORTIS_REPO_OWNER: ${{ vars.FORTIS_REPO_OWNER }}
        run: |
          if [ -z "${FORTIS_REPO_OWNER}" ]; then
            echo "::error::GitHub Variable FORTIS_REPO_OWNER is not set. Create it (repo Settings > Secrets and variables > Actions > Variables) with your GitHub owner/org before publishing."
            exit 1
          fi
          if [ -z "${FORTIS_PUBLISHER_NAME:-}" ]; then
            echo "::warning::FORTIS_PUBLISHER_NAME is not set; Windows publisher identity will be empty (unsigned updater fallback)."
          fi

      - name: Build datasets
        run: npm run build:datasets

      - name: Build app
        run: npm run build

      - name: Package and publish
        shell: bash
        run: |
          EXTRA=()
          if [ -z "${APPLE_ID}" ]; then
            echo "::warning::No Apple credentials — building macOS unsigned, notarization disabled."
            EXTRA+=(-c.mac.notarize=false)
          fi
          if [ -z "${CSC_LINK}" ] && [ -z "${WIN_CSC_LINK}" ]; then
            echo "::warning::No signing certificates — building unsigned installers."
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          npx electron-builder --publish onTagOrDraft "${EXTRA[@]}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORTIS_REPO_OWNER: ${{ vars.FORTIS_REPO_OWNER }}
          FORTIS_PUBLISHER_NAME: ${{ vars.FORTIS_PUBLISHER_NAME }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
