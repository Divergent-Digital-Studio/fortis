appId: com.fortis.security
productName: Fortis
copyright: Copyright © 2026

directories:
  buildResources: resources
  output: dist

files:
  - "out/**/*"
  - "resources/**/*"
  - "!resources/fonts/**/*"
  # Shipped via extraResources and read from process.resourcesPath; keeping them
  # here too would bundle the ~76 MB GeoIP dataset a second time inside the asar.
  - "!resources/datasets/**/*"

extraResources:
  - from: "resources/datasets"
    to: "datasets"
    filter:
      - "**/*"

publish:
  provider: github
  owner: ${FORTIS_REPO_OWNER}
  repo: fortis

mac:
  category: public.app-category.utilities
  icon: resources/icon.icns
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  darkModeSupport: true
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true

win:
  icon: resources/icon.ico
  artifactName: ${productName}-${version}-setup.${ext}
  publisherName: ${FORTIS_PUBLISHER_NAME}
  target:
    - target: nsis
      arch:
        - x64

signtoolOptions:
  signingHashAlgorithms: ["sha256"]
  rfc3161TimeStampServer: http://timestamp.digicert.com

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

linux:
  icon: resources/icons
  category: Utility
  artifactName: ${productName}-${version}.${ext}
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64

asar: true

extraMetadata:
  main: ./out/main/index.js

npmRebuild: true
nodeGypRebuild: false
